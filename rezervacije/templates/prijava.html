{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-4">
    <div class="card shadow">
        <div class="card-header" style="background:#1a5c2a; color:white;">
            <h5 class="mb-0">Prijava</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Uporabniško ime</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Geslo</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Prijava</button>
            </form>
            <hr>
            <p class="text-center mb-0">Nimate še računa?
                <a href="{% url 'registracija' %}">Registracija</a>
            </p>
        </div>
    </div>
</div>
</div>

{% endblock %}

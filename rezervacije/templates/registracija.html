{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-5">
    <div class="card shadow">
        <div class="card-header" style="background:#1a5c2a; color:white;">
            <h5 class="mb-0">📝 Registracija</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}"
                               name="{{ field.html_name }}"
                               class="form-control {% if field.errors %}is-invalid{% endif %}"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                        {% if field.errors %}
                            <div class="invalid-feedback">{{ field.errors|join:', ' }}</div>
                        {% endif %}
                        {% if field.help_text %}
                            <div class="form-text text-muted">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100">Ustvari račun</button>
            </form>
            <hr>
            <p class="text-center mb-0">Že imaš račun?
                <a href="{% url 'prijava' %}">Prijava</a>
            </p>
        </div>
    </div>
</div>
</div>

{% endblock %}
